name: Security

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - "codex/**"
  schedule:
    - cron: "17 4 * * 1"

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  audit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm audit --omit=dev

  codeql:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]

    steps:
      - uses: actions/checkout@v5

      - uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build

      - uses: github/codeql-action/analyze@v4

  trivy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: aquasecurity/trivy-action@0.33.1
        with:
          scan-type: fs
          format: table
          ignore-unfixed: true
          severity: CRITICAL,HIGH
